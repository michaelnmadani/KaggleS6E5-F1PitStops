
# Iteration 001 — baseline for S6E5 F1 Pit Stops.
# Binary classification: predict P(pit on next lap).
# LightGBM with only median-imputed numeric + label-encoded categoricals.
# Goal: establish a working pipeline and known-good LB reference before research begins.

target: PitNextLap
id_col: id
task: binary
metric: auc

features:
  - fill_na_median
  - label_encode

model: lgbm

params:
  num_boost_round: 2000
  early_stopping_rounds: 100
  learning_rate: 0.05
  num_leaves: 63
  min_data_in_leaf: 50
  feature_fraction: 0.9
  bagging_fraction: 0.9
  bagging_freq: 5
  lambda_l2: 1.0

cv:
  n_splits: 5
  seed: 42
  stratified: true

kernel:
  enable_gpu: false
