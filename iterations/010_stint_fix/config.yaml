# Iteration 010 -- Fix f1_stint_features TyreLife detection + deeper LGBM.
# Bug fix: stint_col now detects TyreLife correctly, unlocking:
#   stint_frac       : TyreLife / expected compound pit window (from training)
#   past_half_stint  : binary flag (past 50% of expected stint length)
#   stint_sq         : quadratic tyre age term
# Also tests deeper trees: num_leaves=255 (vs 127 in 004/005).
# No class_weights. Expected: +0.002-0.007 AUC over best (0.9499).

target: PitNextLap
id_col: id
task: binary
metric: auc

features:
  - fill_na_median
  - f1_tyre_features
  - f1_gap_features
  - f1_stint_features
  - f1_position_features
  - f1_feature_crosses
  - target_encode_binary

model: lgbm

params:
  num_leaves: 255
  n_estimators: 3000
  early_stopping_rounds: 100
  learning_rate: 0.03
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0

cv:
  n_splits: 5
  seed: 42
  stratified: true

kernel:
  enable_gpu: false
