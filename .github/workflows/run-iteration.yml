name: run-iteration

on:
  push:
    branches: [main]
    paths:
      - "iterations/*/config.yaml"
  workflow_dispatch:
    inputs:
      iteration:
        description: "Iteration name (e.g. 001_baseline)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 600  # 10 hrs; kernel polling caps at 9 hrs
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      COMP_SLUG: ${{ vars.COMP_SLUG }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve iteration
        id: pick
        run: |
          set -eu
          if [ -n "${{ inputs.iteration }}" ]; then
            ITER="${{ inputs.iteration }}"
          else
            ITER=$(ls -1 iterations/ 2>/dev/null | grep -E '^[0-9]{3}_' | sort -r | head -1)
          fi
          if [ -z "$ITER" ] || [ ! -f "iterations/$ITER/config.yaml" ]; then
            echo "no iteration to run (ITER=$ITER)"; exit 0
          fi
          echo "iteration=$ITER" >> "$GITHUB_OUTPUT"
          echo "Running iteration: $ITER"

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install tooling
        run: pip install kaggle jupytext pyyaml

      - name: Build kernel
        if: steps.pick.outputs.iteration != ''
        run: python scripts/build_notebook.py "${{ steps.pick.outputs.iteration }}"

      - name: Push kernel to Kaggle
        if: steps.pick.outputs.iteration != ''
        run: kaggle kernels push -p build/kernel

      - name: Poll for completion
        if: steps.pick.outputs.iteration != ''
        id: poll
        run: |
          set -eu
          SLUG="pipeline-iter-$(echo '${{ steps.pick.outputs.iteration }}' | tr '_' '-')"
          URL="https://www.kaggle.com/api/v1/kernels/status?userName=${KAGGLE_USERNAME}&kernelSlug=${SLUG}"
          echo "Polling ${KAGGLE_USERNAME}/${SLUG}"
          for i in $(seq 1 540); do
            BODY=$(curl -sS -u "${KAGGLE_USERNAME}:${KAGGLE_KEY}" -H "Accept: application/json" "$URL" || echo '{"status":"poll_error"}')
            STATUS=$(echo "$BODY" | jq -r '.status // "unknown"')
            MSG=$(echo "$BODY"    | jq -r '.failureMessage // ""')
            echo "[$i] status=$STATUS msg=$MSG"
            case "$STATUS" in
              complete)                                   echo "status=complete" >> "$GITHUB_OUTPUT"; exit 0 ;;
              error|cancelAcknowledged|cancelRequested)   echo "status=$STATUS"  >> "$GITHUB_OUTPUT"; echo "failure=$MSG" >> "$GITHUB_OUTPUT"; exit 0 ;;
            esac
            sleep 60
          done
          echo "status=timeout" >> "$GITHUB_OUTPUT"

      - name: Pull kernel output
        if: steps.pick.outputs.iteration != ''
        run: |
          set -eu
          ITER="${{ steps.pick.outputs.iteration }}"
          KID="${KAGGLE_USERNAME}/pipeline-iter-$(echo "$ITER" | tr '_' '-')"
          OUT="iterations/$ITER/kernel_output"
          mkdir -p "$OUT"
          kaggle kernels output "$KID" -p "$OUT" || true
          ls -la "$OUT"

      - name: Open results PR
        if: steps.pick.outputs.iteration != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          ITER="${{ steps.pick.outputs.iteration }}"
          STATUS="${{ steps.poll.outputs.status }}"
          BRANCH="results/$ITER"
          LABEL="results"
          TITLE="Results: iteration $ITER"
          if [ ! -s "iterations/$ITER/kernel_output/submission.csv" ] || [ "$STATUS" != "complete" ]; then
            LABEL="broken"
            TITLE="BROKEN: iteration $ITER (status=$STATUS)"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "iterations/$ITER/kernel_output"
          git commit -m "$TITLE" || { echo "nothing to commit"; exit 0; }
          git push -u --force origin "$BRANCH"
          BODY="Auto-generated by run-iteration. Kaggle kernel status: \`$STATUS\` · category: \`$LABEL\`. Review metrics.json before approving submit.yml."
          if PR_NUM=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null) && [ -n "$PR_NUM" ]; then
            gh pr edit "$PR_NUM" --title "$TITLE" --body "$BODY" || true
          else
            gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "$BODY" || true
          fi
